# fly.toml for frontend deployment on Fly.io
app = "ruben-tracks-popularity-frontend"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"
  args = { VITE_API_BASE_URL = "https://ruben-tracks-popularity-backend.fly.dev" }

[env]
  NODE_ENV = "production"

[http_service]
  internal_port = 80
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

# Proxy API calls to backend if needed, or update VITE_API_BASE_URL